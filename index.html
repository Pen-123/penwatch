<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pen Watch • Live Global Conflict & Military Tracker</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', 'Segoe UI', 'Roboto', sans-serif;
        }

        /* info panel styling */
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 12px 20px;
            color: white;
            z-index: 10;
            pointer-events: none;
            font-size: 14px;
            font-weight: 500;
            border-left: 4px solid #ff3366;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            font-family: monospace;
        }
        #info-panel h1 {
            margin: 0;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }
        #info-panel p {
            margin: 4px 0 0;
            font-size: 0.75rem;
            opacity: 0.8;
        }
        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 15px;
            border-radius: 40px;
            color: white;
            font-size: 12px;
            z-index: 10;
            font-weight: 500;
            display: flex;
            gap: 16px;
            pointer-events: none;
            font-family: monospace;
        }
        .legend span {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 2px;
            margin-right: 6px;
            vertical-align: middle;
        }
        .sidebar {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            background: rgba(10, 10, 20, 0.92);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            color: #f0f0f0;
            z-index: 20;
            font-family: 'Segoe UI', system-ui;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
            pointer-events: auto;
            overflow: hidden;
        }
        .sidebar-header {
            padding: 18px 20px 10px;
            font-weight: bold;
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.4);
        }
        .sidebar-content {
            padding: 16px 20px 20px;
            max-height: 70vh;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        .news-item {
            margin-bottom: 20px;
            border-left: 3px solid #ff3366;
            padding-left: 12px;
        }
        .news-title {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 5px;
        }
        .news-source {
            font-size: 0.7rem;
            opacity: 0.7;
            letter-spacing: 0.5px;
        }
        .livestream-btn {
            display: inline-block;
            margin-top: 8px;
            background: #e63946;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: bold;
            text-decoration: none;
            color: white;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }
        .livestream-btn:hover {
            background: #ff4d6d;
            transform: scale(1.02);
        }
        iframe {
            width: 100%;
            height: 180px;
            border-radius: 16px;
            margin-top: 10px;
            border: none;
        }
        .close-sidebar {
            float: right;
            background: none;
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            opacity: 0.7;
        }
        .status-badge {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #000000aa;
            backdrop-filter: blur(4px);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 11px;
            color: #0f0;
            font-family: monospace;
            z-index: 10;
            pointer-events: none;
        }
        @media (max-width: 700px) {
            .sidebar { width: 260px; top: 10px; right: 10px; }
            .legend { font-size: 10px; bottom: 10px; left: 10px; }
        }
    </style>
</head>
<body>
    <div id="info-panel">
        <h1>🔴 PEN WATCH ▸ LIVE GLOBE</h1>
        <p>⚡ conflict zones | ✈️ military jets & missiles (simulated live) | 📡 powered by Liveuamap + Flightradar24 style</p>
    </div>
    <div class="legend">
        <div><span style="background: #e34234;"></span> Active conflict / bombing</div>
        <div><span style="background: #2e8b57;"></span> Safe / neutral</div>
        <div><span style="background: #ffaa33;"></span> Tensions / unrest</div>
        <div><span style="background: #5a5a8a;"></span> Gray — unknown</div>
        <div><span style="background: #ff0000; border-radius: 50%;"></span> ✈️ Military jet (live track)</div>
    </div>
    <div class="sidebar" id="newsSidebar" style="display: none;">
        <div class="sidebar-header">
            <span id="countryNameSidebar">Country</span>
            <button class="close-sidebar" id="closeSidebarBtn">✕</button>
        </div>
        <div class="sidebar-content" id="sidebarContent">
            <!-- dynamic news + livestream -->
        </div>
    </div>
    <div class="status-badge" id="aircraftCounter">
        🛩️ MIL TRACKING: 12 active units
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.35.1/dist/globe.gl.min.js"></script>
    <script src="https://unpkg.com/topojson@3.0.2/dist/topojson.min.js"></script>
    
    <script>
        (function(){
            // ---------- CONFLICT COLOR SCHEME (based on real events & demo) ----------
            // country name -> color (hex)
            const countryColors = {
                "United Arab Emirates": "#e34234",   // red - bombing/conflict
                "UAE": "#e34234",
                "Switzerland": "#2e8b57",           // green - safe
                "Swiss Confederation": "#2e8b57",
                "Ukraine": "#e34234",                // active war
                "Russia": "#e34234",
                "Syria": "#e34234",
                "Yemen": "#e34234",
                "Palestine": "#e34234",
                "Israel": "#ffaa33",                 // orange tension
                "Lebanon": "#ffaa33",
                "Myanmar": "#e34234",
                "Sudan": "#e34234",
                "Ethiopia": "#ffaa33",
                "Somalia": "#ffaa33",
                "Afghanistan": "#e34234",
                "Iraq": "#ffaa33",
                "Libya": "#e34234",
                "USA": "#ffaa33",
                "United States": "#ffaa33",
                "China": "#ffaa33",
                "North Korea": "#e34234",
                "South Korea": "#2e8b57",
                "Japan": "#2e8b57",
                "Germany": "#2e8b57",
                "France": "#2e8b57",
                "Canada": "#2e8b57",
                "Australia": "#2e8b57",
                "India": "#ffaa33",
                "Pakistan": "#ffaa33"
            };
            
            // default fallback color
            const DEFAULT_COLOR = "#5a5a8a";
            
            // ---------- NEWS & LIVESTREAM DATABASE (local + Al Jazeera & live streams) ----------
            // when user clicks a country, we show relevant war news / livestream
            const newsDatabase = {
                "United Arab Emirates": {
                    countryDisplay: "🇦🇪 United Arab Emirates",
                    articles: [
                        { title: "⚡ UAE region: Airstrikes reported near Abu Dhabi | Al Jazeera Exclusive", source: "Al Jazeera", livestreamUrl: "https://www.youtube.com/embed/2kH7j9L7qP8?autoplay=0", hasStream: true },
                        { title: "Military escalation: Gulf of Oman tensions rise", source: "Liveuamap", livestreamUrl: null }
                    ],
                    defaultStream: "https://www.youtube.com/embed/2kH7j9L7qP8?autoplay=0"
                },
                "Switzerland": {
                    countryDisplay: "🇨🇭 Switzerland (Neutral)",
                    articles: [
                        { title: "Swiss government calls for peace mediation", source: "SRF News", livestreamUrl: null },
                        { title: "Geneva peace talks scheduled", source: "Reuters", livestreamUrl: null }
                    ]
                },
                "Ukraine": {
                    countryDisplay: "🇺🇦 Ukraine",
                    articles: [
                        { title: "Frontline updates: Heavy battles in Donetsk | Al Jazeera Live", source: "Al Jazeera", livestreamUrl: "https://www.youtube.com/embed/5fZ0kjtOxP0?autoplay=0" },
                        { title: "Zelensky: 'We need air defense' - watch military briefing", source: "Kyiv Independent", livestreamUrl: null }
                    ]
                },
                "Russia": {
                    countryDisplay: "🇷🇺 Russia",
                    articles: [
                        { title: "Russian MOD claims drone interceptions | Liveuamap radar", source: "Liveuamap", livestreamUrl: null },
                        { title: "State TV: 'Special military operation continues'", source: "Russia Today", livestreamUrl: null }
                    ]
                },
                "Syria": {
                    countryDisplay: "🇸🇾 Syria",
                    articles: [
                        { title: "Idlib airstrikes reported, follow Al Jazeera stream", source: "Al Jazeera", livestreamUrl: "https://www.youtube.com/embed/zcdDlLVRJzA?autoplay=0" }
                    ]
                },
                "Israel": {
                    countryDisplay: "🇮🇱 Israel",
                    articles: [
                        { title: "Iron Dome intercepts rockets | Live updates", source: "Channel 12", livestreamUrl: "https://www.youtube.com/embed/sJvNk7OPQaM?autoplay=0" }
                    ]
                },
                "default": {
                    countryDisplay: "📍 Region",
                    articles: [
                        { title: "Global security briefing | Al Jazeera English", source: "Al Jazeera", livestreamUrl: "https://www.youtube.com/embed/6bDbwO9o4JU?autoplay=0" },
                        { title: "Flightradar24: Military activity in area", source: "Flightradar24 style", livestreamUrl: null }
                    ]
                }
            };
            
            function getNewsForCountry(countryName) {
                let key = null;
                if (newsDatabase[countryName]) key = countryName;
                else if (countryName === "UAE") key = "United Arab Emirates";
                else if (countryName === "Swiss Confederation") key = "Switzerland";
                else if (countryName === "USA" || countryName === "United States") key = "USA";
                else if (countryName === "Ukraine") key = "Ukraine";
                else if (countryName === "Russia") key = "Russia";
                else if (countryName === "Syria") key = "Syria";
                else if (countryName === "Israel") key = "Israel";
                else key = "default";
                return newsDatabase[key] || newsDatabase.default;
            }
            
            // ---------- GLOBE INIT ----------
            const globeContainer = document.createElement('div');
            globeContainer.style.width = '100%';
            globeContainer.style.height = '100%';
            globeContainer.style.position = 'absolute';
            document.body.appendChild(globeContainer);
            
            const Globe = Globe();
            const world = Globe(globeContainer)
                .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
                .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
                .showAtmosphere(true)
                .atmosphereColor('#3a6ea5')
                .atmosphereAltitude(0.25);
            
            // add ambient light
            world._renderer.setClearColor(0x050b1a);
            
            // ---------- LOAD WORLD MAP POLYGONS (TopoJSON) ----------
            let polygonsData = [];
            fetch('https://cdn.jsdelivr.net/npm/world-atlas@2.0.2/countries-50m.json')
                .then(res => res.json())
                .then(worldTopo => {
                    const countriesGeo = topojson.feature(worldTopo, worldTopo.objects.countries);
                    const features = countriesGeo.features;
                    
                    // attach polygon data
                    polygonsData = features.map(feat => {
                        const countryName = feat.properties.name;
                        let color = DEFAULT_COLOR;
                        if (countryColors[countryName]) color = countryColors[countryName];
                        else {
                            // try fuzzy match: some names like "United Arab Emirates"
                            for (let key in countryColors) {
                                if (countryName.toLowerCase().includes(key.toLowerCase()) || key.toLowerCase().includes(countryName.toLowerCase())) {
                                    color = countryColors[key];
                                    break;
                                }
                            }
                        }
                        return {
                            ...feat,
                            color: color,
                            name: countryName
                        };
                    });
                    
                    world
                        .polygonsData(polygonsData)
                        .polygonCapColor(d => d.color)
                        .polygonSideColor(() => 'rgba(0,0,0,0.1)')
                        .polygonStrokeColor(() => '#111')
                        .polygonAltitude(0.01)
                        .onPolygonClick((polygon, event) => {
                            const country = polygon;
                            const countryName = country.name || "Region";
                            const newsObj = getNewsForCountry(countryName);
                            document.getElementById('countryNameSidebar').innerHTML = newsObj.countryDisplay;
                            const contentDiv = document.getElementById('sidebarContent');
                            let html = '';
                            for(let article of newsObj.articles) {
                                html += `
                                    <div class="news-item">
                                        <div class="news-title">📰 ${article.title}</div>
                                        <div class="news-source">🔹 ${article.source}</div>
                                        ${article.livestreamUrl ? `<button class="livestream-btn" data-stream="${article.livestreamUrl}">▶ LIVE STREAM / WATCH</button>` : ''}
                                    </div>
                                `;
                            }
                            // add default livestream from Al Jazeera English or relevant
                            if(newsObj.defaultStream && !newsObj.articles.some(a=>a.livestreamUrl)) {
                                html += `<div class="news-item"><div class="news-title">🌍 Al Jazeera English Live</div><button class="livestream-btn" data-stream="${newsObj.defaultStream}">▶ WATCH LIVE NEWS</button></div>`;
                            }
                            // extra military radar note
                            html += `<div style="margin-top:12px; font-size:11px; border-top: 1px solid #444; padding-top:8px;">✈️ Live military radar overlay active — simulated Flightradar24 & OpenSky style</div>`;
                            contentDiv.innerHTML = html;
                            
                            // attach livestream embed after click on buttons
                            document.querySelectorAll('.livestream-btn').forEach(btn => {
                                btn.addEventListener('click', (e) => {
                                    e.stopPropagation();
                                    const streamUrl = btn.getAttribute('data-stream');
                                    const existingIframe = contentDiv.querySelector('.live-iframe');
                                    if(existingIframe) existingIframe.remove();
                                    const iframe = document.createElement('iframe');
                                    iframe.src = streamUrl;
                                    iframe.className = 'live-iframe';
                                    iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
                                    iframe.allowFullscreen = true;
                                    btn.insertAdjacentElement('afterend', iframe);
                                });
                            });
                            
                            document.getElementById('newsSidebar').style.display = 'block';
                        });
                })
                .catch(err => console.warn("Polygon loading error, but fallback works:", err));
            
            // close sidebar
            document.getElementById('closeSidebarBtn').addEventListener('click', () => {
                document.getElementById('newsSidebar').style.display = 'none';
            });
            
            // ---------- MILITARY JETS & MISSILES TRACKING (SIMULATED BUT REALISTIC) ----------
            // Using globe.gl points layer, update every frame to simulate fighter jets, bombers, missile trails.
            // Create dynamic array of moving objects with lat/lng, altitude ignored but visual points.
            let militaryUnits = [];
            // generate 18 units (fighter jets, drones, missiles)
            const unitNames = ["F-16 Falcon", "Su-35 Flanker", "MQ-9 Reaper", "B-52 Stratofortress", "RAF Typhoon", "MiG-31", "J-20", "Dassault Rafale", "Tomahawk Missile", "KH-101 Cruise Missile", "F-35 Lightning", "Eurofighter", "Sukhoi S-70", "Predator Drone", "AH-64 Apache", "MQ-1C", "JASSM Missile", "SCALP EG"];
            
            for(let i=0; i<18; i++) {
                // random start positions around conflict zones (lat, lng)
                let lat = (Math.random() * 60 - 30);  // -30 to 30 focus on mid-east/europe
                let lng = (Math.random() * 360 - 180);
                // cluster around conflict hotspots: Ukraine, Middle east
                if(i % 3 === 0) { lat = 30 + Math.random() * 15; lng = 35 + Math.random() * 30; } // middle east
                if(i % 3 === 1) { lat = 48 + Math.random() * 10; lng = 30 + Math.random() * 20; } // Ukraine/europe
                if(i % 3 === 2) { lat = 25 + Math.random() * 20; lng = 55 + Math.random() * 30; } // gulf region
                
                const speed = 0.3 + Math.random() * 0.7; // degrees per frame approx (but per second ~0.3)
                const heading = Math.random() * 360;
                militaryUnits.push({
                    id: i,
                    name: unitNames[i % unitNames.length],
                    lat: lat,
                    lng: lng,
                    speed: speed,
                    heading: heading,
                    type: i < 14 ? "jet" : "missile",
                    lastUpdate: Date.now()
                });
            }
            
            // update positions every ~60ms, smooth movement
            function updateMilitaryPositions() {
                for(let unit of militaryUnits) {
                    // move based on heading
                    const rad = unit.heading * Math.PI / 180;
                    const deltaLat = Math.cos(rad) * unit.speed * 0.5;
                    const deltaLng = Math.sin(rad) * unit.speed * 0.8 / Math.cos(unit.lat * Math.PI/180);
                    let newLat = unit.lat + deltaLat;
                    let newLng = unit.lng + deltaLng;
                    // wrap around longitude
                    if(newLng > 180) newLng -= 360;
                    if(newLng < -180) newLng += 360;
                    // boundary wrap latitude soft clamp
                    if(newLat > 85) newLat = 85;
                    if(newLat < -85) newLat = -85;
                    
                    unit.lat = newLat;
                    unit.lng = newLng;
                    
                    // random heading shift to simulate maneuvers
                    if(Math.random() < 0.02) {
                        unit.heading += (Math.random() - 0.5) * 30;
                        if(unit.heading < 0) unit.heading += 360;
                        if(unit.heading >= 360) unit.heading -= 360;
                    }
                    // speed variation
                    if(Math.random() < 0.01) unit.speed = Math.min(1.5, Math.max(0.2, unit.speed + (Math.random() - 0.5)*0.3));
                }
                // update points layer on globe
                const pointsData = militaryUnits.map(unit => ({
                    lat: unit.lat,
                    lng: unit.lng,
                    name: unit.name,
                    type: unit.type,
                    size: unit.type === "missile" ? 0.8 : 1.2
                }));
                world
                    .pointsData(pointsData)
                    .pointColor(d => d.type === "missile" ? "#ff5500" : "#ff3333")
                    .pointAltitude(0.02)
                    .pointRadius(d => d.type === "missile" ? 0.4 : 0.6)
                    .pointLabel(d => `✈️ ${d.name}\n📍 ${d.lat.toFixed(2)}, ${d.lng.toFixed(2)}\n⚡ military active track`);
                
                // update counter
                const jetsCount = militaryUnits.filter(u => u.type === "jet").length;
                const missilesCount = militaryUnits.filter(u => u.type === "missile").length;
                document.getElementById('aircraftCounter').innerHTML = `🛩️ MIL TRACK: ${jetsCount} jets | 🚀 ${missilesCount} missiles (sim)`;
            }
            
            // animate movement with smooth frame rate
            let lastTimestamp = 0;
            function animateMilitary(now) {
                requestAnimationFrame(animateMilitary);
                updateMilitaryPositions();
            }
            requestAnimationFrame(animateMilitary);
            
            // Additional: add some custom missile trails / arcs? using arcs layer (optional visual)
            // Create missile flight paths between hotspots (just for show)
            setTimeout(() => {
                // arcs between conflict points to simulate ballistic missiles
                const arcs = [
                    {startLat: 24.4539, startLng: 54.3773, endLat: 32.2357, endLng: 35.1252, color: '#ff6666'}, // UAE to Israel region
                    {startLat: 50.4501, startLng: 30.5234, endLat: 55.7558, endLng: 37.6173, color: '#ff4444'}, // Kyiv to Moscow
                    {startLat: 34.0209, startLng: 38.5668, endLat: 33.5138, endLng: 36.2765, color: '#ff8844'} // Syria cross
                ];
                world.arcsData(arcs)
                    .arcColor(d => d.color)
                    .arcAltitude(0.25)
                    .arcStroke(0.8)
                    .arcLabel(() => '⚡ missile corridor (simulated radar)');
            }, 1000);
            
            // Optionally load flightradar24 style overlay text
            // also add a small tooltip to show "Liveuamap events"
            // final touches: add pulsing effect on conflict zones via extra rings? not needed for mvp.
            
            // Add extra dummy markers for "liveuamap events" - some random icons?
            const events = [
                {lat: 24.4667, lng: 54.3667, title: "UAE: Air defense alert | Liveuamap"},
                {lat: 31.9539, lng: 35.9106, title: "Amman: drone activity reported"},
                {lat: 48.3794, lng: 31.1656, title: "Ukraine: missile warning, livestream"},
                {lat: 33.5138, lng: 36.2765, title: "Damascus outskirts: airstrikes"},
            ];
            world
                .pointsData(events)
                .pointColor(() => '#ffff66')
                .pointRadius(0.4)
                .pointLabel(d => d.title);
            
            // adjust camera initial view to middle east / europe
            world.pointOfView({ lat: 28.5, lng: 45.0, altitude: 2.2 }, 500);
            
            // small console info
            console.log("Pen Watch LIVE — conflict globe, military jets & livestreams ready");
            
            // make sidebar close on outside click? optional but fine
            document.addEventListener('click', function(e) {
                const sidebar = document.getElementById('newsSidebar');
                if(sidebar.style.display === 'block') {
                    if(!sidebar.contains(e.target) && !e.target.closest('.livestream-btn') && !e.target.closest('.polygon-clickable')) {
                        // optional keep open if clicking on globe polygon? we avoid auto close to keep user experience
                        // but do not close when clicking polygon again? fine.
                    }
                }
            });
            
            // fix globe resize
            window.addEventListener('resize', () => {
                world._renderer.setSize(window.innerWidth, window.innerHeight);
                world._camera.aspect = window.innerWidth / window.innerHeight;
                world._camera.updateProjectionMatrix();
            });
            
            // simulate Flightradar24 data source string
            const flightradarCredit = document.createElement('div');
            flightradarCredit.style.position = 'absolute';
            flightradarCredit.style.bottom = '12px';
            flightradarCredit.style.right = '70px';
            flightradarCredit.style.fontSize = '9px';
            flightradarCredit.style.backgroundColor = '#00000066';
            flightradarCredit.style.padding = '2px 8px';
            flightradarCredit.style.borderRadius = '20px';
            flightradarCredit.style.color = '#ccc';
            flightradarCredit.style.fontFamily = 'monospace';
            flightradarCredit.innerText = '✈️ Radar data: OpenSky + Flightradar24 style simulation | Liveuamap conflict alerts';
            document.body.appendChild(flightradarCredit);
        })();
    </script>
</body>
</html>
